<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风格管理 - MarkTrans</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="top-nav">
        <div class="brand">MarkTrans</div>
        <nav class="nav-links">
            <a class="nav-link" href="/">转换工作台</a>
            <a class="nav-link active" href="/styles">风格管理</a>
            <a class="nav-link" href="/admin">规则与数据管理</a>
            <a class="nav-link" href="/docs">系统说明</a>
        </nav>
        <div class="pill">样式系统</div>
    </header>

    <main class="page">
        <section class="card">
            <h2>新增风格</h2>
            <div class="table-tools">
                <select id="baseStyleSelect"></select>
                <input id="newStyleName" type="text" placeholder="输入新风格名称">
                <button class="btn btn-success" id="cloneStyleBtn">基于选中风格复制并启用</button>
            </div>
        </section>

        <section class="card">
            <h2>风格列表</h2>
            <div id="stylesTableWrap" class="table-wrap"></div>
        </section>
    </main>

    <script src="/styles.js"></script>
</body>
</html>
