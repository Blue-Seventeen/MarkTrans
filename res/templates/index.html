<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>转换工作台 - MarkTrans</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body data-theme="dark">
    <header class="top-nav">
        <div class="brand">MarkTrans</div>
        <nav class="nav-links">
            <a class="nav-link active" href="/">转换工作台</a>
            <a class="nav-link" href="/styles">风格管理</a>
            <a class="nav-link" href="/admin">规则与数据管理</a>
            <a class="nav-link" href="/docs">系统说明</a>
        </nav>
        <div id="activeStyleLabel" class="pill" role="button" tabindex="0">当前模式：深色（点此切换亮色）</div>
    </header>

    <main class="page workbench-page">
        <section class="toolbar">
            <div class="field">
                <label>Markdown 文件路径</label>
                <input id="filePath" type="text" placeholder="例如 G:\Obsidian\notes\post.md">
            </div>
            <div class="field">
                <label>附件目录路径</label>
                <input id="imageDir" type="text" placeholder="例如 G:\Obsidian\attachments">
            </div>
            <div class="field">
                <label>转换样式</label>
                <select id="styleSelect"></select>
            </div>
            <button class="btn btn-primary" id="pickPathBtn">选择本地文件/文件夹</button>
            <button class="btn btn-success" id="convertBtn">一键转换</button>
        </section>

        <section class="workspace-grid">
            <article class="panel">
                <div class="panel-header">
                    <span>Markdown 输入</span>
                    <button class="btn btn-ghost" id="loadByPathBtn">按路径读取</button>
                </div>
                <div class="panel-body">
                    <textarea id="markdownInput" class="editor" placeholder="输入 Markdown 内容"></textarea>
                </div>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <span>AST 输出</span>
                    <button class="btn btn-ghost" id="copyAstBtn">复制</button>
                </div>
                <div class="panel-body">
                    <textarea id="astOutput" class="json-view" readonly></textarea>
                </div>
            </article>

            <article class="panel">
                <div class="panel-header">
                    <span>HTML 输出</span>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-ghost" id="htmlViewToggleBtn">切换到源码</button>
                        <button class="btn btn-ghost" id="copyHtmlBtn">复制当前视图</button>
                    </div>
                </div>
                <div class="panel-body">
                    <div id="htmlPreview" class="html-preview"></div>
                    <textarea id="htmlSource" class="html-source hidden" readonly></textarea>
                </div>
            </article>
        </section>

        <section id="statusBar" class="status-bar">状态：等待输入</section>
    </main>
    <script src="/theme.js"></script>
    <script src="/workbench.js"></script>
</body>
</html>
