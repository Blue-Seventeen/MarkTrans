<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则与数据管理 - MarkTrans</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="top-nav">
        <div class="brand">MarkTrans</div>
        <nav class="nav-links">
            <a class="nav-link" href="/">转换工作台</a>
            <a class="nav-link" href="/styles">风格管理</a>
            <a class="nav-link active" href="/admin">规则与数据管理</a>
            <a class="nav-link" href="/docs">系统说明</a>
        </nav>
        <div class="pill">数据库管理</div>
    </header>

    <main class="page">
        <section class="card">
            <h2>数据库可视化管理</h2>
            <p class="toolbar-caption">工具栏用于切换数据表、选择展示列，并可直接执行只读 SQLite 查询。</p>
            <div class="table-tools admin-tools">
                <div class="field">
                    <label>选择数据表</label>
                    <select id="tableSelect">
                        <option value="mapping_base">mapping_base</option>
                        <option value="mapping_style">mapping_style</option>
                        <option value="mapping_rule">mapping_rule</option>
                    </select>
                </div>
                <div class="field">
                    <label>选择展示列（勾选即生效）</label>
                    <div id="columnChecklist" class="column-checklist"></div>
                </div>
                <div class="field sql-field">
                    <label>执行 SQLite（仅 SELECT）</label>
                    <input id="sqlInput" type="text" placeholder="例如：SELECT id, style_name FROM mapping_style ORDER BY id DESC">
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <button class="btn btn-ghost" id="runSqlBtn">执行 SQL</button>
                </div>
                <div class="field">
                    <label>&nbsp;</label>
                    <button class="btn btn-success" id="addBtn">新增记录</button>
                </div>
            </div>
            <div id="tableContainer" class="table-wrap admin-table-wrap"></div>
        </section>
    </main>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <strong id="modalTitle">编辑记录</strong>
                <button class="btn btn-danger" id="closeModalBtn">关闭</button>
            </div>
            <div class="modal-body" id="modalForm"></div>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
