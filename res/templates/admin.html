<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>规则与数据管理 - MarkTrans</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="top-nav">
        <div class="brand">MarkTrans</div>
        <nav class="nav-links">
            <a class="nav-link" href="/">转换工作台</a>
            <a class="nav-link" href="/styles">风格管理</a>
            <a class="nav-link active" href="/admin">规则与数据管理</a>
            <a class="nav-link" href="/docs">系统说明</a>
        </nav>
        <div class="pill">数据库管理</div>
    </header>

    <main class="page">
        <section class="card">
            <h2>数据库可视化管理</h2>
            <div class="table-tools">
                <select id="tableSelect">
                    <option value="mapping_base">mapping_base</option>
                    <option value="mapping_style">mapping_style</option>
                    <option value="mapping_rule">mapping_rule</option>
                </select>
                <select id="sortColumnSelect"></select>
                <select id="sortOrderSelect">
                    <option value="asc">升序</option>
                    <option value="desc">降序</option>
                </select>
                <button class="btn btn-primary" id="sortBtn">应用排序</button>
                <button class="btn btn-success" id="addBtn">新增记录</button>
            </div>
            <div id="tableContainer" class="table-wrap"></div>
        </section>
    </main>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <strong id="modalTitle">编辑记录</strong>
                <button class="btn btn-danger" id="closeModalBtn">关闭</button>
            </div>
            <div class="modal-body" id="modalForm"></div>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
